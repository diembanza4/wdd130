<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us</title>
    <meta name="description"
      content="Contact us! Whether you’re a beginner or an experienced rafter, we provide expert safety tips and guided tours tailored to your level. Reach out today to plan your next unforgettable journey on the rapids.">
    <meta name="author" content="Diem Banza Mwamba">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.jpg" alt="White Water Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>

        <!-- Company Info -->
        <section class="company-info">
            <h2>White Water Rafting Company</h2>
            <p>123 Main River Street<br>Kolob, California</p>
            <p>Phone: +1 999 999 9999</p>
            <p>Email: info@whitewater.com</p>

            <!-- Embedded Google Map -->
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!..." allowfullscreen=""
                  loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </section>

        <!-- Employee Profiles -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <figure>
                <img src="images/employee1.jpg" alt="Employee 1">
                <figcaption>Jane Doe – Tour Guide</figcaption>
            </figure>
            <figure>
                <img src="images/employee2.jpg" alt="Employee 2">
                <figcaption>John Smith – Safety Instructor</figcaption>
            </figure>
            <figure>
                <img src="images/employee3.jpg" alt="Employee 3">
                <figcaption>Emily Johnson – Reservations Manager</figcaption>
            </figure>
        </section>

        <!-- Contact Form -->
        <section class="contact-form">
            <h2>Get in Touch!</h2>
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <fieldset>
                    <legend>Message Purpose:</legend>
                    <label><input type="radio" name="purpose" value="general"> General
                        Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation"> Reservation
                        Question</label>
                    <label><input type="radio" name="purpose" value="suggestion"> Website
                        Suggestion</label>
                </fieldset>

                <label for="message">Message:</label>
                <textarea id="message" name="message" placeholder="Type here"></textarea>

                <label>
                    <input type="checkbox" name="subscribe"> Please subscribe me to the monthly
                    newsletter
                </label>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 &#10070; The Rapids &#10070; Diem Banza Mwamba</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.jpg" alt="Facebook logo">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.jpg" alt="LinkedIn logo">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="Instagram logo">
            </a>
        </nav>
    </footer>

</body>

</html>
