<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Exercise</title>
    <link rel="stylesheet" href="styles/table.css">
</head>

<body>
    <label for="browser"></label>
    <main>
        <form>
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>
            <label for="usermail">Email:</label>
            <input type="email" id="usermail" name="usermail" required>

            <p>How this select element appears (with some added styling):</p>
            <label for="quantity">Select Quantity</label>
            <select>
                <option value="1">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
            </select>

            <label for="browser">What is your favorite internet browser?</label>
            <select id="browser" name="browser">
                <option value="chrome">chrome</option>
                <option value="firefox">Firefox</option>
                <option value="edge">Edge</option>
                <option value="brave">Brave</option>
                <option value="other">Other</option>
                <select />
                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" id="pet" name="pet">
                <label for="feedback">List the places you have lives:</label>
                <textarea id="feedback" name="feedback" rows="4"
                  placeholder="Stillwater Florida, Amsterdam Netherlands, Timbuktu Mali"></textarea>

                <button type="submit">Submit Poll</button>


        </form>

    </main>

</body>

</html>
